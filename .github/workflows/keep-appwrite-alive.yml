name: Keep Appwrite alive

# Ping every 5 days (midnight UTC) so Appwrite Cloud never hits the 7-day inactivity pause.
# https://appwrite.io/docs/advanced/platform/cloud#paused-instances

on:
  schedule:
    - cron: '0 0 */5 * *'
  workflow_dispatch:  # allow manual trigger for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Appwrite health endpoint
        run: |
          curl -sf -o /dev/null -w "HTTP %{http_code}\n" \
            https://cloud.appwrite.io/v1/health/time || true
